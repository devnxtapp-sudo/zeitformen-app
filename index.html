    />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#0f1117" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="rxZone" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="rxZone" />
    <meta property="og:title" content="rxZone – Entwickelt für Athleten" />
    <meta property="og:description" content="Plane deine Trainingsziele und verfolge deinen Fortschritt." />
    <meta property="og:image" content="https://rxzone.de/logo.png" />
    <meta property="og:url" content="https://rxzone.de/" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="rxZone – Entwickelt für Athleten" />
    <meta name="twitter:image" content="https://rxzone.de/logo.png" />
  </head>
  <body>
    <div id="app"></div>
    <script>
      // Apply saved theme before render to avoid a flash (default: dark).
      (function () {
        try {
          var t = localStorage.getItem("rxz-theme") === "light" ? "light" : "dark";
          var el = document.documentElement;
          el.classList.toggle("dark", t !== "light");
          el.classList.toggle("light", t === "light");
          el.style.colorScheme = t;
        } catch (e) {}
      })();
    </script>
    <script>
      // Self-heal: if a stale service worker serves an outdated shell that
      // references deleted asset chunks, the app never mounts (#app stays empty
      // → blank page). Detect that and recover once by dropping SW + caches and
      // reloading, so a new deploy can never leave the PWA permanently broken.
      (function () {
        setTimeout(function () {
          var app = document.getElementById("app");
          var mounted = app && app.childElementCount > 0;
          var cssOk = false;
          try {
            cssOk = !!getComputedStyle(document.documentElement).getPropertyValue("--accent").trim();
          } catch (e) {}
          // healthy = app mounted AND theme stylesheet applied
          if (mounted && cssOk) return;
          if (sessionStorage.getItem("rxz-healed")) return;
          sessionStorage.setItem("rxz-healed", "1");
          var done = function () { location.reload(); };
          var clearCaches = function () {
            if (window.caches && caches.keys) {
              caches.keys().then(function (ks) {
                return Promise.all(ks.map(function (k) { return caches.delete(k); }));
              }).then(done, done);
            } else { done(); }
          };
          if (navigator.serviceWorker && navigator.serviceWorker.getRegistrations) {
            navigator.serviceWorker.getRegistrations().then(function (rs) {
              return Promise.all(rs.map(function (r) { return r.unregister(); }));
            }).then(clearCaches, clearCaches);
          } else { clearCaches(); }
        }, 5000);
      })();
    </script>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
